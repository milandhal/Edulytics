services:
  db:
    image: postgres:15
    container_name: edulytics-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edulytics
    ports:
      - "5432:5432"
    volumes:
      - edulytics_pgdata:/var/lib/postgresql/data

volumes:
  edulytics_pgdata:

